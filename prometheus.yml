global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sentinel-gateway
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: neo4j
    static_configs:
      - targets: ["neo4j:2004"]
    metrics_path: /metrics
