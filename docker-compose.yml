version: "3.9"

# =============================================================================
# Sentinel — Full Stack (all services)
# Use: docker-compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure (same as docker-compose.dev.yml)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sentinel

  neo4j:
    image: neo4j:5.18-community
    container_name: sentinel-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sentinel_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./database/schema.cypher:/var/lib/neo4j/import/schema.cypher:ro
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-sentinel_dev_password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sentinel

  ollama:
    image: ollama/ollama:latest
    container_name: sentinel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 5m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - sentinel

  langfuse:
    image: langfuse/langfuse:2
    container_name: sentinel-langfuse
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-sentinel_langfuse_secret_changeme}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT:-sentinel_salt_changeme}
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - sentinel

  langfuse-db:
    image: postgres:16-alpine
    container_name: sentinel-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sentinel

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: sentinel-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      OLLAMA_BASE_URL: http://ollama:11434
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sentinel
    restart: unless-stopped

  audit-worker:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: sentinel-audit-worker
    command: ["python", "-m", "database.stream_consumer"]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - sentinel
    restart: unless-stopped

  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - sentinel
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - sentinel
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: sentinel-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-sentinel_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/sentinel-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sentinel
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: sentinel-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel
    restart: unless-stopped

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
  ollama_models:
  langfuse_db_data:
  prometheus_data:
  grafana_data:

networks:
  sentinel:
    driver: bridge
