# =============================================================================
# Sentinel Policy — Financial v1.0.0
# Governs: agents with policy_group = "financial"
# =============================================================================

id: financial-v1
version: "1.0.0"
policy_group: financial
effective_from: "2026-01-01T00:00:00Z"
effective_until: null
parent_version: null
description: >
  Baseline financial policy. Enforces payment limits, blocks known malicious
  recipient patterns, and routes high-value transactions to the LLM judge.

rate_limits:
  tokens_per_minute: 30
  bucket_size: 30
  burst_multiplier: 1.0

rules:

  # ---------------------------------------------------------------------------
  # Rule 1: Block path traversal and sensitive file reads (fast path)
  # ---------------------------------------------------------------------------
  - id: rule-path-traversal-denylist
    description: Block read_file calls to sensitive system paths
    severity: critical
    type: denylist
    applies_to_tools: [read_file]
    action: block
    config:
      argument_key: path
      match_mode: prefix
      patterns:
        - "/etc/"
        - "/proc/"
        - "/sys/"
        - "/root/"
        - "/var/shadow"
        - "C:\\Windows\\System32"

  # ---------------------------------------------------------------------------
  # Rule 2: Block email to denied domains (fast path)
  # ---------------------------------------------------------------------------
  - id: rule-email-denylist
    description: Block outbound email to known exfiltration targets
    severity: high
    type: denylist
    applies_to_tools: [send_email]
    action: block
    config:
      argument_key: to
      match_mode: contains
      patterns:
        - "admin@"
        - "root@"
        - "@malicious"
        - "@competitor"

  # ---------------------------------------------------------------------------
  # Rule 3: Maximum single payment threshold (fast path)
  # ---------------------------------------------------------------------------
  - id: rule-max-payment-amount
    description: Block payments exceeding $100,000 USD
    severity: high
    type: threshold
    applies_to_tools: [execute_payment]
    action: block
    config:
      argument_key: amount
      max_value: 100000
      currency_argument: currency

  # ---------------------------------------------------------------------------
  # Rule 4: Allowed payment currencies (fast path)
  # ---------------------------------------------------------------------------
  - id: rule-payment-currency-allowlist
    description: Only allow payments in USD, EUR, GBP
    severity: medium
    type: allowlist
    applies_to_tools: [execute_payment]
    action: block
    config:
      argument_key: currency
      patterns: [USD, EUR, GBP]

  # ---------------------------------------------------------------------------
  # Rule 5: PII database query detection (fast path → cognitive escalation)
  # ---------------------------------------------------------------------------
  - id: rule-pii-query-regex
    description: Flag SQL queries that access user/customer PII tables
    severity: high
    type: regex
    applies_to_tools: [database_query, execute_sql]
    action: cognitive_check
    config:
      argument_key: query
      pattern: "(?i)SELECT.*(FROM\\s+(users|customers|accounts|pii|personal))"

  # ---------------------------------------------------------------------------
  # Rule 6: High-value payments require faithfulness + intent check
  # ---------------------------------------------------------------------------
  - id: rule-high-value-payment-cognitive
    description: >
      Payments over $10,000 require LLM judge to verify the agent's reasoning
      is faithful to source documents and that intent is not suspicious.
    severity: high
    type: cognitive
    applies_to_tools: [execute_payment]
    action: cognitive_check
    config:
      check_types: [faithfulness, intent]
      min_confidence: 0.80
      trigger_condition:
        argument_key: amount
        min_value: 10000

  # ---------------------------------------------------------------------------
  # Rule 7: Bulk data exports require human review
  # ---------------------------------------------------------------------------
  - id: rule-bulk-export-human-review
    description: >
      Any write_file call with a .csv or .json extension containing >100 rows
      is flagged for human review.
    severity: medium
    type: regex
    applies_to_tools: [write_file]
    action: human_review
    config:
      argument_key: path
      pattern: "(?i)\\.(csv|json|xlsx|parquet)$"

  # ---------------------------------------------------------------------------
  # Rule 8: Block prompt injection keywords in reasoning field
  # ---------------------------------------------------------------------------
  - id: rule-prompt-injection-reasoning
    description: >
      Block requests where the agent's context.task_description contains
      known prompt injection patterns.
    severity: critical
    type: regex
    applies_to_tools: []   # applies to ALL tools
    action: block
    config:
      argument_key: "__context.task_description"
      pattern: "(?i)(ignore (all |previous |prior )?(rules|instructions|constraints)|disregard|jailbreak|DAN mode)"
