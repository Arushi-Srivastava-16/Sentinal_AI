# =============================================================================
# External Secrets Operator — sync secrets from AWS Secrets Manager
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#
# Store these in AWS Secrets Manager as JSON at path: sentinel/production
#   {
#     "admin-api-key": "snl_...",
#     "anthropic-api-key": "sk-ant-...",
#     "redis-url": "rediss://...",
#     "neo4j-uri": "bolt://...",
#     "neo4j-user": "neo4j",
#     "neo4j-password": "..."
#   }
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: sentinel-secret-store
  namespace: sentinel
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1    # REPLACE with your region
      auth:
        jwt:
          serviceAccountRef:
            name: sentinel-gateway   # Uses IRSA
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sentinel-secrets
  namespace: sentinel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: sentinel-secret-store
    kind: SecretStore
  target:
    name: sentinel-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: sentinel/production
