apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: sentinel
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentinel-gateway
  namespace: sentinel
  annotations: {}
  # Add if using AWS IRSA:
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/sentinel-gateway
