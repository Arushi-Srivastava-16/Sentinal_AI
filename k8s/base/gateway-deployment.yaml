apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: sentinel
  labels:
    app: gateway
    app.kubernetes.io/name: sentinel-gateway
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sentinel-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: ghcr.io/your-org/sentinel-gateway:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SENTINEL_GATEWAY_ENV
              value: production
            - name: SENTINEL_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: admin-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: anthropic-api-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: redis-url
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: neo4j-uri
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: neo4j-user
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: neo4j-password
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: SENTINEL_GATEWAY_CORS_ORIGINS
              value: '["https://sentinel.your-domain.com"]'
            - name: SENTINEL_RATE_LIMIT_REQUESTS
              value: "50"
            - name: SENTINEL_RATE_LIMIT_WINDOW_SECONDS
              value: "60"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gateway
