apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-worker
  namespace: sentinel
  labels:
    app: audit-worker
spec:
  # Single replica — Redis Streams consumer group handles parallelism
  # Scale by adding more replicas; each joins the same consumer group
  replicas: 2
  selector:
    matchLabels:
      app: audit-worker
  template:
    metadata:
      labels:
        app: audit-worker
    spec:
      serviceAccountName: sentinel-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: audit-worker
          image: ghcr.io/your-org/sentinel-gateway:1.0.0
          command: ["python", "-m", "database.stream_consumer"]
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: redis-url
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: neo4j-uri
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: neo4j-user
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: neo4j-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
